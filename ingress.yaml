apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jira-ingress
  namespace: jira
  annotations:
    # Основные аннотации для Traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/request-body-max-size: "100m"
    traefik.ingress.kubernetes.io/buffer-max-wait-time: "120"
    traefik.ingress.kubernetes.io/server.stripprefix: "false"
spec:
  ingressClassName: traefik
  rules:
  - host: jira.example.com  # замените на ваш реальный домен
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jira
            port:
              number: 8080
