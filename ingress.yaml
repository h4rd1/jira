apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jira-ingress
  namespace: jira
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: jira.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jira
            port:
              number: 8080