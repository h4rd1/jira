apiVersion: apps/v1
kind: Deployment
metadata:
  name: jira
  labels:
    app: jira  # метки для самого Deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jira  # должен совпадать с template.metadata.labels
  template:
    metadata:
      labels:
        app: jira  # обязательно должно совпадать с selector.matchLabels
    spec:
      containers:
      - name: jira
        image: h4rdl/jira
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
        readinessProbe:
          httpGet:
            path: /login.jsp
            port: 8080
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /status
            port: 8080
          initialDelaySeconds: 240
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: jira-data
          mountPath: /var/atlassian/application-data/jira
      volumes:
      - name: jira-data
        persistentVolumeClaim:
          claimName: jira-pvc
      terminationGracePeriodSeconds: 300
